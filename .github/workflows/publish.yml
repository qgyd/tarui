name: publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ── Job 1: 仅做版本检查，几秒内完成 ──────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release_check.outputs.should_release }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: meta
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: release_check
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if git show-ref --tags --verify --quiet "refs/tags/v${VERSION}"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: 各平台独立编译，只打必要包格式 ────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,updater
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg,updater
          - platform: ubuntu-22.04
            target: ""
            bundles: appimage,deb,updater
          - platform: windows-latest
            target: ""
            bundles: nsis,msi,updater

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Sync app version from package.json
        shell: bash
        run: |
          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          const version = JSON.parse(fs.readFileSync('./package.json', 'utf8')).version;
          const tauriConfPath = './src-tauri/tauri.conf.json';
          const tauriConf = JSON.parse(fs.readFileSync(tauriConfPath, 'utf8'));
          tauriConf.version = version;
          fs.writeFileSync(tauriConfPath, JSON.stringify(tauriConf, null, 2) + '\n');
          const cargoPath = './src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8');
          const pkgIdx = cargo.indexOf('[package]');
          if (pkgIdx === -1) throw new Error('Cargo.toml missing [package] section');
          const nextSectionIdx = cargo.indexOf('\n[', pkgIdx + 1);
          const head = cargo.slice(0, pkgIdx);
          const pkgSection = cargo.slice(pkgIdx, nextSectionIdx === -1 ? cargo.length : nextSectionIdx);
          const tail = nextSectionIdx === -1 ? '' : cargo.slice(nextSectionIdx);
          if (!/^version\s*=\s*".*"$/m.test(pkgSection)) throw new Error('Cargo.toml [package] version line not found');
          const updatedPkgSection = pkgSection.replace(/^version\s*=\s*".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, head + updatedPkgSection + tail);
          NODE

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}
          else
            npm run tauri build -- --bundles ${{ matrix.bundles }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}-${{ matrix.target || 'default' }}
          if-no-files-found: warn
          path: src-tauri/target/**/release/bundle/**

  # ── Job 3: 汇总产物、生成 latest.json、创建 Release ──────────────────────
  release:
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check.outputs.version }}
      GH_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts for debugging
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        run: |
          gh release create "v${VERSION}" \
            --repo "${GH_REPO}" \
            --title "v${VERSION}" \
            --notes "See the assets to download this version and install."

      - name: Upload bundle files
        run: |
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.app.tar.gz" -o \
            -name "*.AppImage.tar.gz" -o \
            -name "*.nsis.zip" -o \
            -name "*.msi.zip" -o \
            -name "*.sig" \
          \) -print0 | xargs -0 gh release upload "v${VERSION}" --repo "${GH_REPO}" --clobber

      - name: Generate latest.json for updater
        shell: bash
        run: |
          BASE_URL="https://github.com/${GH_REPO}/releases/download/v${VERSION}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          node --input-type=module - <<NODE
          import fs from 'node:fs';
          import path from 'node:path';

          const baseUrl = "${BASE_URL}";
          const version = "${VERSION}";
          const pubDate = "${PUB_DATE}";

          function walk(dir) {
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) results.push(...walk(full));
              else results.push(full);
            }
            return results;
          }

          const files = walk('artifacts');

          function findFile(pattern) {
            return files.find(f => pattern.test(path.basename(f)));
          }
          function readSig(sigPath) {
            if (!sigPath) return '';
            try { return fs.readFileSync(sigPath, 'utf8').trim(); }
            catch { return ''; }
          }

          const platforms = {};

          // macOS aarch64
          const macArmTar = findFile(/\.app\.tar\.gz$/);
          const macArmTarFiles = files.filter(f => /aarch64.*\.app\.tar\.gz$/.test(f) && !f.endsWith('.sig'));
          const macArmSig  = files.filter(f => /aarch64.*\.app\.tar\.gz\.sig$/.test(f));
          if (macArmTarFiles.length > 0 && macArmSig.length > 0) {
            platforms['darwin-aarch64'] = {
              signature: readSig(macArmSig[0]),
              url: baseUrl + '/' + path.basename(macArmTarFiles[0]),
            };
          }

          // macOS x86_64
          const macX64TarFiles = files.filter(f => /x86_64.*\.app\.tar\.gz$/.test(f) && !f.endsWith('.sig'));
          const macX64Sig  = files.filter(f => /x86_64.*\.app\.tar\.gz\.sig$/.test(f));
          if (macX64TarFiles.length > 0 && macX64Sig.length > 0) {
            platforms['darwin-x86_64'] = {
              signature: readSig(macX64Sig[0]),
              url: baseUrl + '/' + path.basename(macX64TarFiles[0]),
            };
          }

          // Linux x86_64
          const linuxTarFiles = files.filter(f => /\.AppImage\.tar\.gz$/.test(f) && !f.endsWith('.sig'));
          const linuxSig = files.filter(f => /\.AppImage\.tar\.gz\.sig$/.test(f));
          if (linuxTarFiles.length > 0 && linuxSig.length > 0) {
            platforms['linux-x86_64'] = {
              signature: readSig(linuxSig[0]),
              url: baseUrl + '/' + path.basename(linuxTarFiles[0]),
            };
          }

          // Windows x86_64
          const winNsisFiles = files.filter(f => /\.nsis\.zip$/.test(f) && !f.endsWith('.sig'));
          const winNsisSig = files.filter(f => /\.nsis\.zip\.sig$/.test(f));
          if (winNsisFiles.length > 0 && winNsisSig.length > 0) {
            platforms['windows-x86_64'] = {
              signature: readSig(winNsisSig[0]),
              url: baseUrl + '/' + path.basename(winNsisFiles[0]),
            };
          }

          const latest = { version, notes: 'See the assets to download this version and install.', pub_date: pubDate, platforms };
          fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2));
          console.log('Generated latest.json:');
          console.log(JSON.stringify(latest, null, 2));
          NODE

      - name: Upload latest.json
        run: |
          gh release upload "v${VERSION}" latest.json --repo "${GH_REPO}" --clobber
