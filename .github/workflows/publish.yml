name: publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ── Job 1: 仅做版本检查，几秒内完成 ──────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release_check.outputs.should_release }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: meta
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: release_check
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if git show-ref --tags --verify --quiet "refs/tags/v${VERSION}"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: 各平台独立编译，只打必要包格式 ────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg,app
          - platform: ubuntu-22.04
            target: ""
            bundles: appimage,deb
          - platform: windows-latest
            target: ""
            bundles: nsis,msi

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Sync app version from package.json
        shell: bash
        run: |
          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          const version = JSON.parse(fs.readFileSync('./package.json', 'utf8')).version;
          const tauriConfPath = './src-tauri/tauri.conf.json';
          const tauriConf = JSON.parse(fs.readFileSync(tauriConfPath, 'utf8'));
          tauriConf.version = version;
          fs.writeFileSync(tauriConfPath, JSON.stringify(tauriConf, null, 2) + '\n');
          const cargoPath = './src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8');
          const pkgIdx = cargo.indexOf('[package]');
          if (pkgIdx === -1) throw new Error('Cargo.toml missing [package] section');
          const nextSectionIdx = cargo.indexOf('\n[', pkgIdx + 1);
          const head = cargo.slice(0, pkgIdx);
          const pkgSection = cargo.slice(pkgIdx, nextSectionIdx === -1 ? cargo.length : nextSectionIdx);
          const tail = nextSectionIdx === -1 ? '' : cargo.slice(nextSectionIdx);
          if (!/^version\s*=\s*".*"$/m.test(pkgSection)) throw new Error('Cargo.toml [package] version line not found');
          const updatedPkgSection = pkgSection.replace(/^version\s*=\s*".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, head + updatedPkgSection + tail);
          NODE

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}
          else
            npm run tauri build -- --bundles ${{ matrix.bundles }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}-${{ matrix.target || 'default' }}
          if-no-files-found: warn
          path: src-tauri/target/**/release/bundle/**

  # ── Job 3: 汇总产物、生成 latest.json、创建 Release ──────────────────────
  release:
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check.outputs.version }}
      GH_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          gh release create "v${VERSION}" \
            --repo "${GH_REPO}" \
            --title "v${VERSION}" \
            --notes "See the assets to download this version and install."

      - name: Upload bundle files
        run: |
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.app.tar.gz" -o \
            -name "*.sig" -o \
            -name "*.nsis.zip" \
          \) -print0 | xargs -0 gh release upload "v${VERSION}" --repo "${GH_REPO}" --clobber

