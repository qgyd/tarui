name: publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: meta
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: release_check
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if git show-ref --tags --verify --quiet "refs/tags/v${VERSION}"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies (ubuntu only)
        if: steps.release_check.outputs.should_release == 'true' && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup node
        if: steps.release_check.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: steps.release_check.outputs.should_release == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        if: steps.release_check.outputs.should_release == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        if: steps.release_check.outputs.should_release == 'true'
        run: npm install

      - name: Sync app version from package.json
        if: steps.release_check.outputs.should_release == 'true'
        shell: bash
        run: |
          node - <<'NODE'
          import fs from 'node:fs';
          const version = JSON.parse(fs.readFileSync('./package.json', 'utf8')).version;
          const tauriConfPath = './src-tauri/tauri.conf.json';
          const tauriConf = JSON.parse(fs.readFileSync(tauriConfPath, 'utf8'));
          tauriConf.version = version;
          fs.writeFileSync(tauriConfPath, JSON.stringify(tauriConf, null, 2) + '\n');
          const cargoPath = './src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8');
          const pkgIdx = cargo.indexOf('[package]');
          if (pkgIdx === -1) throw new Error('Cargo.toml missing [package] section');
          const nextSectionIdx = cargo.indexOf('\n[', pkgIdx + 1);
          const head = cargo.slice(0, pkgIdx);
          const pkgSection = cargo.slice(pkgIdx, nextSectionIdx === -1 ? cargo.length : nextSectionIdx);
          const tail = nextSectionIdx === -1 ? '' : cargo.slice(nextSectionIdx);
          const updatedPkgSection = pkgSection.replace(/^version\s*=\s*".*"$/m, `version = "${version}"`);
          if (updatedPkgSection === pkgSection) throw new Error('Cargo.toml [package] version line not found');
          fs.writeFileSync(cargoPath, head + updatedPkgSection + tail);
          NODE

      - uses: tauri-apps/tauri-action@v0
        if: steps.release_check.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
